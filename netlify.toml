[build]
  command = "echo 'window.__ENV__ = { GROQ_API_KEY: \"'$GROQ_API_KEY'\", FIREBASE_API_KEY: \"'$FIREBASE_API_KEY'\", FIREBASE_AUTH_DOMAIN: \"'$FIREBASE_AUTH_DOMAIN'\", FIREBASE_PROJECT_ID: \"'$FIREBASE_PROJECT_ID'\", FIREBASE_STORAGE_BUCKET: \"'$FIREBASE_STORAGE_BUCKET'\", FIREBASE_MESSAGING_SENDER_ID: \"'$FIREBASE_MESSAGING_SENDER_ID'\", FIREBASE_APP_ID: \"'$FIREBASE_APP_ID'\" };' > js/env.netlify.js"
  publish = "/"

[build.environment]
  GROQ_API_KEY = ""
  FIREBASE_API_KEY = ""
  FIREBASE_AUTH_DOMAIN = ""
  FIREBASE_PROJECT_ID = ""
  FIREBASE_STORAGE_BUCKET = ""
  FIREBASE_MESSAGING_SENDER_ID = ""
  FIREBASE_APP_ID = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
